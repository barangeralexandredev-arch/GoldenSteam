<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Redirection...</title>
  <style>
    html, body {
      height: 100%;
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: #000;
    }
    img.fullscreen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0;
      animation: fadeInOut 2s ease-in-out forwards;
    }
    @keyframes fadeInOut {
      0% { opacity: 0; }
      20% { opacity: 1; }
      80% { opacity: 1; }
      100% { opacity: 0; }
    }
  </style>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const target = 'Alexandre Baranger.html';
      // Redirection après l'animation (2s)
      setTimeout(() => {
        window.location.replace(target);
      }, 2000);
    });
  </script>
</head>
<body>
  <!-- Remplace l'URL ci-dessous par celle de ton image -->
  <img src="image.jpg" alt="Redirection" class="fullscreen">
  <noscript>
    <div style="height:100%;display:flex;align-items:center;justify-content:center;color:white;background:black;text-align:center;">
      <p>JavaScript est désactivé. <a href="Alexandre Baranger.html" style="color:white;text-decoration:underline;">Cliquez ici pour accéder à la page</a>.</p>
    </div>
  </noscript>
</body>
</html>
